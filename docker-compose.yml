# ZYVA infrastructure — vector DB + observability.
# Usage: docker compose up -d
# (Host port 5432 is already taken on this machine, so Langfuse's Postgres uses 5433.)

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zyva-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - zyva_qdrant_storage:/qdrant/storage
    restart: unless-stopped

  langfuse-db:
    image: postgres:16
    container_name: zyva-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    ports:
      - "5433:5432"
    volumes:
      - zyva_langfuse_pg:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: zyva-langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: zyva-local-dev-secret-change-me
      SALT: zyva-local-dev-salt-change-me
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: zyva
      LANGFUSE_INIT_PROJECT_ID: zyva
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-zyva-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-zyva-local
      LANGFUSE_INIT_USER_EMAIL: admin@zyva.local
      LANGFUSE_INIT_USER_PASSWORD: zyvaadmin123
      LANGFUSE_INIT_USER_NAME: ZYVA Admin
    restart: unless-stopped

volumes:
  zyva_qdrant_storage:
  zyva_langfuse_pg:
