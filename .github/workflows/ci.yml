name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build (web)
        run: npm run build
        env:
          # Build does not need real secrets; placeholders keep config happy.
          CEREBRAS_API_KEY: ""
          DASHSCOPE_API_KEY: ""
