name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build (web)
        run: npm run build
        env:
          CEREBRAS_API_KEY: ""
          DASHSCOPE_API_KEY: ""
          OG_PC_API_KEY: ""
          OG_PC_BASE_URL: "https://pc.0g.ai/v1"
          E2B_API_KEY: ""
          DATABASE_URL: "postgresql://x:x@localhost:5432/x"
          NEXTAUTH_SECRET: "ci-placeholder-secret"
          NEXTAUTH_URL: "http://localhost:3000"
